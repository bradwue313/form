<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jackson 5 Audition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo-mark" aria-hidden="true" role="img" aria-label="Jackson 5 audition logo">
        <!-- Music note SVG -->
        <svg viewBox="0 0 24 24" fill="none" stroke="#0f0f0f" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18V5l12-2v13"/>
          <circle cx="6" cy="18" r="3"/>
          <circle cx="18" cy="16" r="3"/>
        </svg>
      </div>
      <h1>Jackson 5 Audition</h1>
      <p class="header-sub">Pick your role to get your questions</p>
    </header>

    <div class="error-banner" id="errorBanner" role="alert" aria-live="assertive">
      Something went wrong. Please try again.
    </div>

    <!-- Info Section -->
    <section class="info-section card">
      <h2 class="section-title">Your info</h2>
      <div class="form-group">
        <label for="fullName" class="form-label">Full name <span class="required-indicator" aria-hidden="true">*</span></label>
        <input type="text" id="fullName" placeholder="e.g. Alex Johnson" autocomplete="name" aria-required="true" />
      </div>
      <div class="divider"></div>
      <div class="form-group">
        <label for="roomNum" class="form-label">Room number <span class="required-indicator" aria-hidden="true">*</span></label>
        <input type="text" id="roomNum" placeholder="e.g. 204" inputmode="numeric" aria-required="true" />
      </div>
    </section>

    <!-- Role Picker -->
    <section class="role-section card">
      <h2 class="section-title">Select your role</h2>
      <div class="role-grid" role="radiogroup" aria-label="Audition role">
        <div class="role-option" data-role="singer" tabindex="0" role="radio" aria-checked="false" aria-label="Singer role, not selected">
          <div class="role-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </div>
          <div class="role-info">
            <h3 class="role-name">Singer</h3>
            <p class="role-desc">Lead vocals</p>
          </div>
        </div>

        <div class="role-option" data-role="electric" tabindex="0" role="radio" aria-checked="false" aria-label="Electric guitar role, not selected">
          <div class="role-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          </div>
          <div class="role-info">
            <h3 class="role-name">Electric guitar</h3>
            <p class="role-desc">Lead / rhythm</p>
          </div>
        </div>

        <div class="role-option" data-role="guitar" tabindex="0" role="radio" aria-checked="false" aria-label="Guitar role, not selected">
          <div class="role-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
          </div>
          <div class="role-info">
            <h3 class="role-name">Guitar</h3>
            <p class="role-desc">Acoustic / bass</p>
          </div>
        </div>

        <div class="role-option" data-role="drummer" tabindex="0" role="radio" aria-checked="false" aria-label="Drummer role, not selected">
          <div class="role-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><ellipse cx="12" cy="11" rx="10" ry="4"/><path d="M2 11v5c0 2.2 4.5 4 10 4s10-1.8 10-4v-5"/><path d="M2 16v3c0 2.2 4.5 4 10 4s10-1.8 10-4v-3"/></svg>
          </div>
          <div class="role-info">
            <h3 class="role-name">Drummer</h3>
            <p class="role-desc">Percussion</p>
          </div>
        </div>

        <div class="role-option full-width" data-role="backstage" tabindex="0" role="radio" aria-checked="false" aria-label="Backstage crew role, not selected">
          <div class="role-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M20.38 3.46L16 2a4 4 0 01-8 0L3.62 3.46a2 2 0 00-1.34 2.23l.58 3.57a1 1 0 00.99.84H5v10a2 2 0 002 2h10a2 2 0 002-2V10h1.15a1 1 0 00.99-.84l.58-3.57a2 2 0 00-1.34-2.23z"/></svg>
          </div>
          <div class="role-info">
            <h3 class="role-name">Backstage crew</h3>
            <p class="role-desc">Outfits & wardrobe</p>
          </div>
        </div>
      </div>
    </section>

    <!-- Questions Section (hidden by default, shown when role selected) -->
    <section class="questions-section" id="questionsSection" aria-live="polite">
      <!-- Questions will be dynamically inserted here by JavaScript -->
    </section>

    <!-- Submit Button -->
    <button class="submit-btn" id="submitBtn">
      <span class="button-text">Submit audition</span>
      <span class="spinner" aria-label="Loading"></span>
    </button>
  </div>

  <!-- Success Screen -->
  <div class="success-screen" id="successScreen" role="region" aria-labelledby="successTitle" aria-describedby="successMessage">
    <div class="success-icon" aria-hidden="true" role="img" aria-label="Success checkmark">
      <svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
    </div>
    <h2 id="successTitle">You're in!</h2>
    <p id="successMessage"></p>
    <button class="reset-btn" id="resetBtn">Submit another</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
